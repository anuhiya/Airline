{% extends "base.html" %}
{% block title %}SkySearch — Find Flights{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h1>✈ Search Available Flights</h1>
    </div>
    <div class="card-body">
        <form method="POST" action="/" onsubmit="return validateForm()">
            <div class="form-grid">
                <div class="form-group">
                    <label for="origin">Origin Airport</label>
                    <select name="origin" id="origin" required>
                        <option value="" disabled selected>Select origin airport…</option>
                        {% for ap in airports %}
                        <option value="{{ ap['airport_code'] }}">
                            {{ ap['airport_code'] }} — {{ ap['name'] }} ({{ ap['city'] }}, {{ ap['country'] }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="dest">Destination Airport</label>
                    <select name="dest" id="dest" required>
                        <option value="" disabled selected>Select destination airport…</option>
                        {% for ap in airports %}
                        <option value="{{ ap['airport_code'] }}">
                            {{ ap['airport_code'] }} — {{ ap['name'] }} ({{ ap['city'] }}, {{ ap['country'] }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date_from">Departure From</label>
                    <input type="date" name="date_from" id="date_from"
                           value="2025-12-29" min="2025-01-01" required />
                </div>

                <div class="form-group">
                    <label for="date_to">Departure To</label>
                    <input type="date" name="date_to" id="date_to"
                           value="2025-12-31" min="2025-01-01" required />
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">
                    🔍 Search Flights
                </button>
            </div>
            <div id="error-msg" style="display:none; color:#dc2626; background:#fef2f2; border:1.5px solid #fca5a5; border-radius:8px; padding:.75rem 1rem; margin-top:1rem; font-size:.9rem;">
    ⚠️ Please select all fields before searching.
</div>

<script>
function validateForm() {
    var origin = document.getElementById('origin').value;
    var dest = document.getElementById('dest').value;
    var from = document.getElementById('date_from').value;
    var to = document.getElementById('date_to').value;
    if (!origin || !dest || !from || !to) {
        document.getElementById('error-msg').style.display = 'block';
        return false;
    }
    return true;
}
</script>
        </form>
    </div>
</div>

{% endblock %}
